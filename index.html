<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>FABU 3D Space-Time Cube</title>
  
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/dark/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
      background-color: #242424; /* Dark background to make colors pop */
    }
    #timeSlider {
      position: absolute;
      bottom: 30px;
      left: 50px;
      right: 50px;
    }
  </style>

  <script>
    require([
      "esri/Map",
      "esri/views/SceneView",
      "esri/layers/GeoJSONLayer",
      "esri/widgets/TimeSlider"
    ], function(Map, SceneView, GeoJSONLayer, TimeSlider) {

    // 1. Define the Space-Time Cube Layer from your GitHub URL
      const stcLayer = new GeoJSONLayer({
        url: "https://raw.githubusercontent.com/syuhada93-ops/fictional-disco/refs/heads/main/TimeCubeSpace.json",
        
        // Match the exact time fields from your raw data!
        timeInfo: {
          startField: "START_DATE", 
          endField: "END_DATE"      
        },
        
        // Render the Points as 3D Cylinders
        renderer: {
          type: "simple",
          symbol: {
            type: "point-3d",
            symbolLayers: [{
              type: "object",
              resource: { primitive: "cylinder" }, // Turns your points into 3D pillars
              width: 25,  // Width of the pillar in meters
              height: 30  // Height of the pillar in meters
            }]
          },
          visualVariables: [{
            type: "color",
            field: "VALUE", // Match the exact consumption field from your data!
            stops: [
              { value: 0, color: "#fee5d9" },         // Light orange for lowest
              { value: 15000, color: "#fb6a4a" },     // Medium orange (adjusted based on your data)
              { value: 35000, color: "#cb181d" }      // Dark red for spikes like your 33880 value!
            ]
          }]
        }
      });

      // 2. Create the 3D Map (Dark Mode)
      const map = new Map({
        basemap: "dark-gray-vector",
        ground: "world-elevation",
        layers: [stcLayer]
      });

      // 3. Setup the View Camera over UTM Johor Bahru
      const view = new SceneView({
        container: "viewDiv",
        map: map,
        camera: {
          position: {
            longitude: 103.635, // UTM JB Longitude
            latitude: 1.559,    // UTM JB Latitude
            z: 1200             // Camera height (zoom level)
          },
          tilt: 65,             // Angle to view the 3D protrusion
          heading: 0
        }
      });

      // 4. Initialize and configure the Time Slider widget
      view.whenLayerView(stcLayer).then(function(layerView) {
        const timeSlider = new TimeSlider({
          container: "timeSlider",
          view: view,
          timeVisible: true,
          loop: true // Automatically loops when it reaches 2025
        });

        // Tell the slider to sync its start/end dates with your data
        stcLayer.when(() => {
          timeSlider.fullTimeExtent = stcLayer.timeInfo.fullTimeExtent;
          timeSlider.stops = {
            interval: { value: 1, unit: "months" } // 1-month steps moving forward
          };
        });
      });

    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
  <div id="timeSlider"></div>
</body>
</html>
