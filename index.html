<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>FABU 3D Space-Time Cube</title>
  
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/dark/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
      background-color: #242424; 
    }
    #timeSlider {
      position: absolute;
      bottom: 30px;
      left: 50px;
      right: 50px;
    }
  </style>

  <script>
    require([
      "esri/Map",
      "esri/views/SceneView",
      "esri/layers/GeoJSONLayer",
      "esri/widgets/TimeSlider"
    ], function(Map, SceneView, GeoJSONLayer, TimeSlider) {

      // 1. Define the Space-Time Cube Layer
      const stcLayer = new GeoJSONLayer({
        url: "https://raw.githubusercontent.com/syuhada93-ops/fictional-disco/refs/heads/main/TimeCubeSpace.json",
        
        objectIdField: "OBJECTID",
        fields: [
          { name: "OBJECTID", type: "oid" },
          { name: "TIME_STEP", type: "integer" }, // We need this to stack them!
          { name: "START_DATE", type: "date" },
          { name: "END_DATE", type: "date" },
          { name: "VALUE", type: "double" }
        ],
        
        timeInfo: {
          startField: "START_DATE", 
          endField: "END_DATE"      
        },

        // THE MAGIC STACKING SCRIPT
        elevationInfo: {
          mode: "relative-to-ground",
          featureExpressionInfo: {
            // Multiplies the month number by 30 meters to stack them physically upward!
            expression: "$feature.TIME_STEP * 30"
          }
        },
        
        // Render the Points as 3D Cylinders
        renderer: {
          type: "simple",
          symbol: {
            type: "point-3d",
            symbolLayers: [{
              type: "object",
              resource: { primitive: "cylinder" }, 
              width: 35,  
              height: 30  // Must match the 30 in the math expression above so they stack perfectly!
            }]
          },
          visualVariables: [{
            type: "color",
            field: "VALUE", 
            stops: [
              { value: 0, color: "#fee5d9" },         
              { value: 15000, color: "#fb6a4a" },     
              { value: 35000, color: "#cb181d" }      
            ]
          }]
        }
      });

      // 2. Create the 3D Map
      const map = new Map({
        basemap: "dark-gray-vector",
        ground: "world-elevation",
        layers: [stcLayer]
      });

      // 3. Setup the View Camera
      const view = new SceneView({
        container: "viewDiv",
        map: map,
        camera: {
          position: {
            longitude: 103.635, 
            latitude: 1.559,    
            z: 1200             
          },
          tilt: 75, // Tilted slightly more so you can see the towers better!         
          heading: 0
        }
      });

      // 4. Initialize the Time Slider widget
      view.when(() => {
        const timeSlider = new TimeSlider({
          container: "timeSlider",
          view: view,
          timeVisible: true,
          loop: false, 
          playRate: 150 // Speed up the animation slightly
        });

        stcLayer.when(() => {
          timeSlider.fullTimeExtent = stcLayer.timeInfo.fullTimeExtent;
          timeSlider.stops = {
            interval: { value: 1, unit: "months" } 
          };
        });
      });

    });
  </script>
</head>
<body>
  <div id="viewDiv"></div>
  <div id="timeSlider"></div>
</body>
</html>
